<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - ClubTracker</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Base Reset */
        body {
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            background: #0f0c29; /* Deep theme matching Admin */
            font-family: 'Inter', sans-serif;
        }

        .dashboard-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            box-sizing: border-box;
        }

        /* Header responsiveness */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap; /* Allows logout button to drop below name on tiny screens */
            gap: 15px;
        }

        .header-top h1 { font-size: clamp(1.5rem, 5vw, 2rem); margin: 0; }

        /* Stats Grid: Changes from 3 columns to 1 column automatically */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin: 30px 0; 
        }

        .stat-card { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-card h3 { font-size: 14px; opacity: 0.7; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #00d2ff; }

        /* Tabs */
        .student-tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 30px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 10px; 
            overflow-x: auto; /* Scrollable tabs on mobile */
            white-space: nowrap;
        }

        .tab-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
            border-radius: 8px;
        }

        .tab-btn.active {
            background: rgba(255,255,255,0.15);
            color: white;
            font-weight: bold;
        }

        /* Table Responsiveness */
        .table-responsive {
            width: 100%;
            overflow-x: auto; /* Horizontal scroll for the table */
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; /* Prevents text squashing */
        }

        th, td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); font-weight: 500; }

        /* Buttons */
        .logout-btn { 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s;
            font-size: 14px;
        }

        .logout-btn:hover { background: rgba(255,255,255,0.2); }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* MOBILE FIXES */
        @media (max-width: 600px) {
            .dashboard-container { padding: 20px 15px; margin: 10px auto; border-radius: 15px; }
            .stats-grid { margin: 20px 0; }
            .header-top { justify-content: center; text-align: center; }
            .header-top div { width: 100%; display: flex; flex-direction: column; gap: 10px; }
            .logout-btn { width: 100%; margin-right: 0 !important; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header-top">
            <h1 id="welcomeMessage">Welcome, Student!</h1>
            <div>
                <button class="logout-btn" style="background: #4CAF50; border-color: #4CAF50; margin-right: 10px;" onclick="window.open('print-logbook.html', '_blank')">🖨️ Generate Logbook</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="student-tabs">
            <button class="tab-btn active" onclick="switchTab('tab-progress', this)">My Progress</button>
            <button class="tab-btn" onclick="switchTab('tab-gallery', this)">Major Events Gallery 📸</button>
        </div>

        <div id="tab-progress" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card"><h3>Total Hours</h3><div class="number" id="totalHours">0</div></div>
                <div class="stat-card"><h3>Remaining</h3><div class="number" id="remainingHours">30</div></div>
                <div class="stat-card"><h3>Credits</h3><div class="number" id="creditsEarned">0</div></div>
            </div>

            <div class="activities-section">
                <h3 style="margin-bottom: 15px; font-size: 18px;">Attended Activities</h3>
                <div class="table-responsive">
                    <table id="activitiesTable">
                        <thead>
                            <tr>
                                <th>Activity Name</th>
                                <th>Description</th>
                                <th>Date & Day</th>
                                <th>Time</th>
                                <th>Hours</th>
                            </tr>
                        </thead>
                        <tbody id="activitiesBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-gallery" class="tab-content">
            <p style="opacity: 0.7;">Check out the latest major events happening on campus!</p>
            <div id="eventsContainer" class="events-grid">
                </div>
        </div>
    </div>

    <script src="student.js"></script>
    <script>
        // Simple tab switching logic if not already in student.js
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
