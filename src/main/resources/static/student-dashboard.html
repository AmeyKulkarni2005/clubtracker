<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - ClubTracker</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 1000px;
            margin: auto;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .stat-card { background: rgba(255, 255, 255, 0.15); padding: 20px; border-radius: 12px; text-align: center; }
        .stat-card h3 { font-size: 14px; opacity: 0.8; margin-bottom: 10px; }
        .stat-card .number { font-size: 36px; font-weight: bold; }
        .logout-btn { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header-top" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 id="welcomeMessage">Welcome, Student!</h1>
            <div>
                <button class="logout-btn" style="background: #4CAF50; border-color: #4CAF50; margin-right: 10px;" onclick="window.open('print-logbook.html', '_blank')">🖨️ Generate Logbook</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        <div class="student-tabs" style="display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px;">
            <button class="tab-btn active" onclick="switchTab('tab-progress', this)">My Progress</button>
            <button class="tab-btn" onclick="switchTab('tab-gallery', this)">Major Events Gallery 📸</button>
        </div>

        <div id="tab-progress" class="tab-content active">
            <p>Here is your co-curricular activity progress.</p>
            <div class="stats-grid">
                <div class="stat-card"><h3>Total Hours</h3><div class="number" id="totalHours">0</div></div>
                <div class="stat-card"><h3>Remaining Hours</h3><div class="number" id="remainingHours">30</div></div>
                <div class="stat-card"><h3>Credits Earned</h3><div class="number" id="creditsEarned">0</div></div>
            </div>

            <div class="activities-section">
                <h3>My Attended Activities</h3>
                <div class="table-responsive">
                    <table id="activitiesTable">
                        <thead>
                            <tr>
                                <th>Activity Name</th>
                                <th>Description</th>
                                <th>Date & Day</th> <th>Time</th>       <th>Hours</th>
                            </tr>
                        </thead>
                        <tbody id="activitiesBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-gallery" class="tab-content">
            <p>Check out the latest major events happening on campus!</p>
            <div id="eventsContainer" class="events-grid">
                </div>
        </div>
    </div>

    <script src="student.js"></script>
</body>
</html>
