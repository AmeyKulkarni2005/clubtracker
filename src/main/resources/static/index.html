<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubTracker Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>Welcome to ClubTracker</h2>
            <p>Manage your co-curricular credits</p>
        </div>

        <div class="role-toggle">
            <button id="studentBtn" class="toggle-btn active" onclick="switchRole('student')">Student</button>
            <button id="adminBtn" class="toggle-btn" onclick="switchRole('admin')">Admin</button>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your college email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Login as Student</button>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
