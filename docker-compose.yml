services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: student_activity_db
      MYSQL_ROOT_PASSWORD: your_password
    ports:
      - "3306:3306"

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/student_activity_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: amey1712